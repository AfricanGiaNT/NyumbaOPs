# Render Blueprint — NyumbaOps API only
#
# The dashboard and public site deploy FREE on Vercel (see instructions below).
# Only the API needs Render because it must stay always-on for Airbnb iCal sync.
#
# Total cost: $7/month (Starter plan — required so service never sleeps)
#
# ─── Vercel setup (free) ────────────────────────────────────────────────────
# 1. Go to vercel.com → New Project → import your repo
# 2. For the DASHBOARD:  set Root Directory = apps/dashboard
# 3. For the PUBLIC SITE: set Root Directory = apps/public
#    → Add custom domain madikweapartments.com to the public site project
# 4. Set NEXT_PUBLIC_API_BASE_URL on both Vercel projects to the API URL below
# ────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: nyumbaops-api
    runtime: node
    plan: starter                   # $7/mo — never sleeps (required for Airbnb iCal polling)
    rootDir: apps/api
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/main
    healthCheckPath: /api
    envVars:
      - key: NODE_ENV
        value: production

      # ── Database (Supabase) ──────────────────
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false

      # ── Auth ────────────────────────────────
      - key: JWT_SECRET
        sync: false   # Long random string — never use the dev placeholder

      # ── Supabase Storage ────────────────────
      - key: SUPABASE_PROJECT_REF
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: property-images

      # ── CORS ────────────────────────────────
      # DASHBOARD_URL  = your Vercel dashboard URL
      # PUBLIC_URL     = https://madikweapartments.com
      # EXTRA_ALLOWED_ORIGINS = any other origins, comma-separated
      - key: DASHBOARD_URL
        sync: false   # e.g. https://nyumbaops-dashboard.vercel.app
      - key: PUBLIC_URL
        sync: false   # https://madikweapartments.com
      - key: EXTRA_ALLOWED_ORIGINS
        sync: false   # https://www.madikweapartments.com,https://madikweapartments.com

      # ── Telegram (optional) ─────────────────
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
